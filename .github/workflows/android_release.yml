name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_STRING | base64 --decode > keystore.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and Sign Release APK
        run: >
          ./gradlew assembleRelease
          -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename Release APK
        run: |
          TAG_NAME=${{ github.ref_name }}
          OLD_PATH="app/build/outputs/apk/release/app-release.apk"
          NEW_PATH="app/build/outputs/apk/release/TextTools-${TAG_NAME}.apk"
          
          if [ -f "$OLD_PATH" ]; then
            mv "$OLD_PATH" "$NEW_PATH"
          else
            echo "Error: Base APK not found" && exit 1
          fi

      - name: Append Diff Link to Changelog
        run: |
          CURRENT_TAG=${{ github.ref_name }}
          CHANGELOG_FILE="changelogs/${CURRENT_TAG}.txt"
          
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREVIOUS_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
          
            echo -e "\n\n**Full Changelog**: $COMPARE_URL" >> "$CHANGELOG_FILE"
            echo "Appended diff link: $COMPARE_URL"
          else
            echo "No previous tag found. Skipping diff link injection."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/TextTools-${{ github.ref_name }}.apk
          body_path: changelogs/${{ github.ref_name }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}